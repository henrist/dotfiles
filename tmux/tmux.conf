# Change prefix key to Ctrl+a
# set-option -g prefix C-a

# Window and pane numbering
set-option -g base-index 1
set-option -g renumber-windows on
set-window-option -g pane-base-index 1

# Create new window in cwd
bind-key c new-window -c "#{pane_current_path}"

# Practical creation of new windows with names
bind-key C command-prompt -p "Name of new window: " "new-window -n '%%' -c '#{pane_current_path}'"

# Use Vi mode
set-window-option -g mode-keys vi

# Cross-platform clipboard copy (macOS + Linux)
set-option -g @copy_command 'if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -in -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi'
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@copy_command}"

# Mouse support
set-option -g mouse on

# More straightforward key bindings for splitting
unbind-key %
bind-key | split-window -h -c "#{pane_current_path}"
bind-key h split-window -h -c "#{pane_current_path}"
unbind-key '"'
bind-key - split-window -v -c "#{pane_current_path}"
bind-key v split-window -v -c "#{pane_current_path}"

# Longer history
set-option -g history-limit 50000

# Terminal emulator window title
set-option -g set-titles on
set-option -g set-titles-string '#S:#I.#P #W'

# Terminal capabilities
set-option -g default-terminal "tmux-256color"
set-option -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"

# Status bar
set-option -g status-style bg=colour235,fg=colour136
set-option -g status-interval 1
set-option -g status-left '#[fg=green]#H#[default] '
set-option -g status-left-length 20
set-option -g status-right '#[fg=cyan,bold]%Y-%m-%d %H:%M:%S#[default]'
set-option -g status-right-length 30

# Notify when other windows have activity
set-window-option -g monitor-activity on
set-option -g visual-activity on

# Highlight active window in status bar
set-window-option -g window-status-style fg=colour244,bg=default
set-window-option -g window-status-current-style fg=colour166,bg=default

# Clock
set-window-option -g clock-mode-colour colour64
set-window-option -g clock-mode-style 24

# Pane border
set-option -g pane-border-style fg=colour235
set-option -g pane-active-border-style fg=colour240

# Message text
set-option -g message-style bg=colour235,fg=colour166

# Pane number display
set-option -g display-panes-active-colour colour33
set-option -g display-panes-colour colour166
